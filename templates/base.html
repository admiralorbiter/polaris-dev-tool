<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Polaris DevTools{% endblock %}</title>
    <meta name="description" content="Development management companion for Polaris projects">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <a href="{{ url_for('dashboard.index') }}" class="nav-brand-link">
                <span class="nav-logo">⚡</span>
                <span class="nav-title">Polaris DevTools</span>
            </a>
        </div>
        <div class="nav-links">
            <a href="{{ url_for('dashboard.index') }}" class="nav-link {% if request.endpoint == 'dashboard.index' %}active{% endif %}">Dashboard</a>
            <a href="{{ url_for('scans.scan_list') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('scans.scan') %}active{% endif %}">Scans</a>
            <a href="{{ url_for('scans.route_list') }}" class="nav-link {% if request.endpoint == 'scans.route_list' %}active{% endif %}">Routes</a>
            <a href="{{ url_for('work_items.work_item_list') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('work_items.') %}active{% endif %}">Work Board</a>
            <a href="{{ url_for('features.feature_list') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('features.') %}active{% endif %}">Features</a>
            <a href="{{ url_for('docs.docs_list') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('docs.') %}active{% endif %}">Docs</a>
            <a href="{{ url_for('initiatives.initiative_list') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('initiatives.') %}active{% endif %}">Initiatives</a>
            <a href="{{ url_for('sessions.session_list') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('sessions.') %}active{% endif %}">Sessions</a>
        </div>
        <div class="nav-status">
            <span class="status-dot"></span>
            <span class="status-text">localhost:5001</span>
        </div>
    </nav>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <span>Polaris DevTools v0.1.0</span>
        <span>·</span>
        <span>Phase 5c: Work Discovery</span>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
