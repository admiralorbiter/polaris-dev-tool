{% extends "base.html" %}

{% block title %}{% if mode == 'create' %}New Work Item{% else %}Edit {{ item.source_id or item.title }}{% endif %} — Polaris DevTools{% endblock %}

{% block content %}
<div class="dashboard">
    <header class="dashboard-header">
        <h1>{% if mode == 'create' %}New Work Item{% else %}Edit Work Item{% endif %}</h1>
    </header>

    <form method="post" class="crud-form">
        <div class="form-grid">
            <div class="form-group form-group-wide">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" required
                       value="{{ item.title if item else '' }}"
                       placeholder="Describe the work item...">
            </div>

            <div class="form-group">
                <label for="source_id">Source ID</label>
                <input type="text" id="source_id" name="source_id"
                       value="{{ item.source_id if item and item.source_id else '' }}"
                       placeholder="TD-001, BUG-003, etc.">
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category">
                    {% for cat in ['tech_debt', 'bug', 'feature', 'review', 'cleanup'] %}
                    <option value="{{ cat }}" {% if item and item.category == cat %}selected{% elif not item and cat == 'tech_debt' %}selected{% endif %}>
                        {{ cat | replace('_', ' ') | title }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" name="priority">
                    {% for p in ['critical', 'high', 'medium', 'low'] %}
                    <option value="{{ p }}" {% if item and item.priority == p %}selected{% elif not item and p == 'medium' %}selected{% endif %}>
                        {{ p | title }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="effort">Effort</label>
                <select id="effort" name="effort">
                    <option value="">—</option>
                    {% for e in ['S', 'M', 'L', 'XL'] %}
                    <option value="{{ e }}" {% if item and item.effort == e %}selected{% endif %}>{{ e }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                    {% for s in ['backlog', 'in_progress', 'done', 'deferred'] %}
                    <option value="{{ s }}" {% if item and item.status == s %}selected{% elif not item and s == 'backlog' %}selected{% endif %}>
                        {{ s | replace('_', ' ') | title }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group form-group-wide">
                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" rows="6"
                          placeholder="Description, context, proposed fix...">{{ item.notes if item and item.notes else '' }}</textarea>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                {% if mode == 'create' %}Create Item{% else %}Save Changes{% endif %}
            </button>
            <a href="{% if mode == 'edit' %}{{ url_for('work_items.work_item_detail', item_id=item.id) }}{% else %}{{ url_for('work_items.work_item_list') }}{% endif %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
